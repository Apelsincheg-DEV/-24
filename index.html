<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ПОШЛИ ИГРАТЬ</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    h1 {
      color: red;
      font-size: 80px;
      text-align: center;
      font-family: Arial, sans-serif;
      animation: shake 0.2s infinite;
    }

    @keyframes shake {
      0% { transform: translate(0px, 0px); }
      25% { transform: translate(5px, -5px); }
      50% { transform: translate(-5px, 5px); }
      75% { transform: translate(5px, 5px); }
      100% { transform: translate(-5px, -5px); }
    }
  </style>
</head>
<body>
  <h1>ПОШЛИ ИГРАТЬ В ФИГУРКИ</h1>
</body>
</html>
